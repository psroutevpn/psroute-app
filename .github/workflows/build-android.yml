name: Build Android APK

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.38.5'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v6

      - name: Clean up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo apt-get autoremove -y && sudo apt-get clean

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.21.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Setup signing key
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/psroute-upload.jks
          cat > android/key.properties << PROPS
          storeFile=$(pwd)/android/psroute-upload.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          PROPS

      - name: Install dependencies & prepare
        run: |
          make android-apk-install-deps
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH
          make android-apk-prepare

      - name: Build APK
        run: make android-apk-release

      - name: Rename outputs
        run: |
          mkdir -p out
          cp ./build/app/outputs/flutter-apk/*arm64-v8a*.apk out/PSRoute-android-arm64.apk || true
          cp ./build/app/outputs/flutter-apk/*armeabi-v7a*.apk out/PSRoute-android-arm7.apk || true
          cp ./build/app/outputs/flutter-apk/*x86_64*.apk out/PSRoute-android-x86_64.apk || true
          cp ./build/app/outputs/flutter-apk/app-release.apk out/PSRoute-android-universal.apk || true
          ls -la out/

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: android-apk
          path: ./out/
          retention-days: 30

      - name: Create or update draft release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: ./out/*
          name: 'Latest Build'
          tag_name: 'latest'
          prerelease: true
          generate_release_notes: false
          body: |
            Автоматическая сборка PS Route Android APK.

            Скачайте `PSRoute-android-universal.apk` для установки на любое Android устройство.
