name: Build Android APK

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.38.5'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v6

      - name: Clean up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo apt-get autoremove -y && sudo apt-get clean

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.21.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Setup signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is empty or not set!"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > android/psroute-upload.jks
          echo "Keystore size: $(wc -c < android/psroute-upload.jks) bytes"
          echo "storeFile=$(pwd)/android/psroute-upload.jks" > android/key.properties
          echo "storePassword=$KEYSTORE_PASSWORD" >> android/key.properties
          echo "keyPassword=$KEYSTORE_PASSWORD" >> android/key.properties
          echo "keyAlias=$KEY_ALIAS" >> android/key.properties
          echo "key.properties created with $(wc -l < android/key.properties) lines"

      - name: Install dependencies & prepare
        run: |
          make android-apk-install-deps
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH
          make android-apk-prepare

      - name: Build APK
        run: make android-apk-release

      - name: Rename outputs
        run: |
          mkdir -p out
          # split-per-abi produces app-arm64-v8a-release.apk
          cp ./build/app/outputs/flutter-apk/*arm64*.apk out/PSRoute-android-arm64.apk || true
          ls -lah out/

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: android-apk
          path: ./out/
          retention-days: 30

      - name: Create or update draft release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: ./out/*
          name: 'Latest Build'
          tag_name: 'latest'
          prerelease: true
          generate_release_notes: false
          body: |
            PS Route Android APK (arm64-only, ~70MB).

            Скачайте `PSRoute-android-arm64.apk` — подходит для 95%+ Android устройств.
